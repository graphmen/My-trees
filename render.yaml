services:
  # 1. FastAPI Python Backend Service
  - type: web
    name: mytrees-qfield-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: QFIELD_BASE_DIR
        value: /tmp/MyTrees
      - key: PYTHON_VERSION
        value: 3.10.0

      # ── QField Cloud ─────────────────────────────────────────────────────
      # URL is not secret, set it here.
      # QFIELD_PROJECT_ID, QFIELD_USERNAME, QFIELD_TOKEN are stored as
      # Render Secret Files (Dashboard → Secret Files) and are automatically
      # read from /etc/secrets/<key> at runtime.
      - key: QFIELD_URL
        value: https://app.qfield.cloud/api/v1/

      # ── Aiven Kafka Connection (SSL Authentication) ──────────────────────
      # Note: For security, KAFKA_CA_CERT, KAFKA_ACCESS_CERT, and KAFKA_ACCESS_KEY
      # are best uploaded via Render Secrets / Secret Files, mounted at /etc/secrets/<key>
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: kafka-3c7118d1-mytrees2026.f.aivencloud.com:15263

  # 2. Static Site Frontend (Vite / React)
  - type: web
    name: mytrees-qfield-frontend
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_BACKEND_URL
        value: https://mytrees-qfield-backend.onrender.com
