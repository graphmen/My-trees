services:
  # 1. FastAPI Python Backend Service
  - type: web
    name: mytrees-qfield-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: QFIELD_BASE_DIR
        value: /tmp/MyTrees
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. Static Site Frontend (Vite / React)
  - type: web
    name: mytrees-qfield-frontend
    env: static
    plan: free
    buildCommand: npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: mytrees-qfield-backend
          property: host
