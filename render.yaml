services:
  # 1. FastAPI Python Backend (web service)
  #    Kafka consumer runs as a background thread INSIDE this service — no extra worker needed.
  - type: web
    name: mytrees-qfield-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: QFIELD_BASE_DIR
        value: /tmp/MyTrees
      - key: PYTHON_VERSION
        value: 3.10.0

      # ── QField Cloud ─────────────────────────────────────────────────────
      - key: QFIELD_URL
        value: https://app.qfield.cloud/api/v1/

      # ── Aiven Kafka (SSL) ─────────────────────────────────────────────────
      # KAFKA_CA_CERT, KAFKA_ACCESS_CERT, KAFKA_ACCESS_KEY → Render Secret Files
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: kafka-3c7118d1-mytrees2026.f.aivencloud.com:15263

      # ── Aiven PostgreSQL ──────────────────────────────────────────────────
      # Set DATABASE_URL in Render Dashboard → Environment → Add Secret
      - key: DATABASE_URL
        sync: false

  # 2. Static Site Frontend
  - type: web
    name: mytrees-qfield-frontend
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_BACKEND_URL
        value: https://mytrees-qfield-backend.onrender.com
