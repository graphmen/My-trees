services:
  # 1. FastAPI Python Backend Service
  - type: web
    name: mytrees-qfield-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: QFIELD_BASE_DIR
        value: /tmp/MyTrees
      - key: PYTHON_VERSION
        value: 3.10.0

      # ── QField Cloud credentials ──────────────────────────────────────────
      # Set the actual values in the Render dashboard under:
      #   Environment → Add Secret File / Secret Variables
      # Do NOT commit real passwords/tokens to git.
      - key: QFIELD_URL
        value: https://app.qfield.cloud/api/v1/
      - key: QFIELD_PROJECT_ID
        sync: false          # Set in Render dashboard → Environment
      - key: QFIELD_USERNAME
        sync: false          # Set in Render dashboard → Environment
      - key: QFIELD_PASSWORD
        sync: false          # Set in Render dashboard → Environment
      - key: QFIELD_TOKEN
        sync: false          # Set in Render dashboard → Environment (preferred over password)

  # 2. Static Site Frontend (Vite / React)
  - type: web
    name: mytrees-qfield-frontend
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_BACKEND_URL
        value: https://mytrees-qfield-backend.onrender.com
